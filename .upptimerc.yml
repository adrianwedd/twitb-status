status-website:
  cname: status.thiswasntinthebrochure.wtf
  logoUrl: https://thiswasntinthebrochure.wtf/favicon.svg
  favicon: https://thiswasntinthebrochure.wtf/favicon.svg
  faviconSvg: https://thiswasntinthebrochure.wtf/favicon.svg
  name: "This Wasn't in the Brochure"
  introTitle: "**Service Status**"
  introMessage: "Real-time monitoring for [thiswasntinthebrochure.wtf](https://thiswasntinthebrochure.wtf) — the book website, R2 media CDN, and API endpoints."
  theme: dark
  navbar:
    - title: Status
      href: /
    - title: The Book
      href: https://thiswasntinthebrochure.wtf/book
    - title: Research
      href: https://thiswasntinthebrochure.wtf/research
    - title: Website
      href: https://thiswasntinthebrochure.wtf
  customHeadHtml: >-
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=EB+Garamond:wght@400;500&family=Cinzel:wght@400;500&display=swap" />
  css: |
    /* Carta Marina theme — matching thiswasntinthebrochure.wtf */
    :root {
      --color-vellum: #F4E4BC;
      --color-vellum-light: #FFFDF5;
      --color-carta-ink: #2C2416;
      --color-ink: #0a0a0f;
      --color-ink-light: #18181b;
      --color-sea-teal: #496760;
      --color-sepia: #8B4513;
      --color-gold: #C5A059;
    }

    body {
      background-color: var(--color-ink) !important;
      color: #e5e5e5 !important;
      font-family: 'EB Garamond', Georgia, serif !important;
      font-size: 1.05rem;
    }

    /* Nav bar */
    nav, .navbar, header {
      background-color: var(--color-ink-light) !important;
      border-bottom: 2px solid rgba(197, 160, 89, 0.2) !important;
      font-family: 'Cinzel', Georgia, serif !important;
    }
    nav a, .navbar a, .nav-link {
      color: #e5e5e5 !important;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.8rem !important;
      font-family: 'Cinzel', Georgia, serif !important;
    }
    nav a:hover, .navbar a:hover {
      color: var(--color-gold) !important;
    }
    .navbar-brand, .logo, nav .font-weight-bold {
      font-family: 'IM Fell English', Georgia, serif !important;
      font-size: 1.2rem !important;
      color: var(--color-gold) !important;
    }

    /* Headings */
    h1, h2, h3, h4, h5 {
      font-family: 'IM Fell English', Georgia, serif !important;
      color: #fff !important;
      letter-spacing: 0.02em;
    }
    h1 { color: var(--color-gold) !important; }

    /* Intro section */
    .intro, .description, .lead {
      font-family: 'EB Garamond', Georgia, serif !important;
      color: #d4d4d4 !important;
    }

    /* Cards and containers */
    .card, .rounded, .shadow, .bg-white, [class*="card"] {
      background-color: var(--color-ink-light) !important;
      border: 1px solid rgba(197, 160, 89, 0.15) !important;
      border-radius: 4px !important;
      color: #e5e5e5 !important;
    }

    /* Status indicators — keep green/red but tint toward maritime palette */
    .bg-success, .badge-success { background-color: var(--color-sea-teal) !important; }
    .text-success { color: #6ec9a8 !important; }
    .bg-danger, .badge-danger { background-color: #8B3A3A !important; }

    /* Links */
    a { color: var(--color-gold) !important; }
    a:hover { color: var(--color-vellum) !important; text-decoration: none !important; }

    /* Response time graphs — teal instead of default blue */
    .graph-line, svg path[stroke] { stroke: var(--color-sea-teal) !important; }

    /* Tables */
    table, .table { color: #d4d4d4 !important; }
    th { font-family: 'Cinzel', Georgia, serif !important; font-size: 0.85rem !important; letter-spacing: 0.03em; text-transform: uppercase; color: var(--color-gold) !important; }
    td { font-family: 'EB Garamond', Georgia, serif !important; }
    tr { border-color: rgba(197, 160, 89, 0.1) !important; }

    /* Footer */
    footer {
      background-color: var(--color-ink) !important;
      border-top: 2px solid rgba(197, 160, 89, 0.2) !important;
      font-family: 'Cinzel', Georgia, serif !important;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: rgba(229, 229, 229, 0.5) !important;
    }

    /* Subtle parchment texture on cards */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(197, 160, 89, 0.03), transparent 70%);
      pointer-events: none;
    }
    .card { position: relative; overflow: hidden; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--color-ink); }
    ::-webkit-scrollbar-thumb { background: rgba(197, 160, 89, 0.3); border-radius: 4px; }

    /* Override any remaining white backgrounds */
    .bg-light, .bg-white, .container-fluid, main { background-color: transparent !important; }

i18n:
  activeIncidents: Active incidents
  allSystemsOperational: All systems operational
